# Wrapper that delegates to the central sync workflow in studio-templates.
#
# Single trigger: workflow_dispatch. Fired manually for testing, and
# automatically by studio-templates' release-stage-prod.yml after a
# staging_to_prod promotion (via the trigger-remote-workflow action).

name: Sync from studio-templates

on:
  workflow_dispatch:
    inputs:
      tool_version:
        description: "New tool (Xpra) version, e.g. 6.2.0-r2-1"
        required: true
        type: string
      connect_version:
        description: "New connect-client version, e.g. 0.12"
        required: true
        type: string
      source_dir:
        description: "studio-templates docker/<dir> to mirror from, e.g. xpra_6.2.0-r2-1"
        required: true
        type: string
      templates_ref:
        description: "studio-templates ref (branch/tag/SHA). Default: master."
        required: false
        type: string
        default: "master"

jobs:
  sync:
    uses: seqeralabs/studio-templates/.github/workflows/sync-studio-tool.yml@master
    with:
      image: "data-studio-xpra"
      tool_version:    ${{ inputs.tool_version }}
      connect_version: ${{ inputs.connect_version }}
      source_dir:      ${{ inputs.source_dir }}
      templates_ref:   ${{ inputs.templates_ref }}
    secrets: inherit
